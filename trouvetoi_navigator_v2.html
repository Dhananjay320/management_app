<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://images.unsplash.com https://fonts.googleapis.com https://fonts.gstatic.com;">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TrouvéToi — Screen Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090B;--s1:#0D0D10;--s2:#111114;--s3:#161618;--s4:#1C1C1F;
  --bd:rgba(255,255,255,.06);--t1:#E8E4DC;--t2:#8A8680;--t3:#4A4844;--t4:#2A2826;
  --gold:#C9A55C;--std:#B4AFA8;--plat:#8BAED4;--wg:#7BA87B;--adm:#E07070;
  --F:'Cormorant Garamond',Georgia,serif;--S:'Jost',sans-serif;--M:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--S);font-size:13px}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(9,9,11,.97);backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:10px;padding:12px 0}
.wm{font-family:var(--F);font-size:17px;font-style:italic;color:var(--t1)}
.sep{width:1px;height:16px;background:var(--bd)}
.ltag{font-size:8px;color:var(--t3);letter-spacing:.14em;text-transform:uppercase;font-family:var(--M)}
.tnav{display:flex;gap:2px}
.np{padding:6px 14px;border:1px solid transparent;border-radius:2px;background:transparent;color:var(--t3);font-family:var(--S);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .18s}
.np:hover{color:var(--t2);border-color:var(--bd)}
.np.na{background:rgba(201,165,92,.08);border-color:rgba(201,165,92,.2);color:var(--gold)}
.np.nw{background:rgba(123,168,123,.08);border-color:rgba(123,168,123,.2);color:var(--wg)}
.np.nad{background:rgba(224,112,112,.08);border-color:rgba(224,112,112,.2);color:var(--adm)}
.body{display:flex;flex:1;overflow:hidden}
.sb{width:234px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--bd);overflow:hidden}
.tstrip{padding:8px 12px;border-bottom:1px solid var(--bd);display:flex;gap:3px}
.tb{padding:4px 9px;border-radius:2px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.tb:hover{border-color:rgba(255,255,255,.1);color:var(--t2)}
.tb.ta{background:rgba(201,165,92,.08);border-color:rgba(201,165,92,.22);color:var(--gold)}
.tb.tp{background:rgba(139,174,212,.08);border-color:rgba(139,174,212,.2);color:var(--plat)}
.sl{flex:1;overflow-y:auto;padding:4px 0 14px;scrollbar-width:thin;scrollbar-color:var(--s4) transparent}
.sl::-webkit-scrollbar{width:2px}
.sh{font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--t4);padding:11px 14px 4px;font-family:var(--M)}
.sbt{display:flex;align-items:center;gap:8px;width:100%;padding:7px 14px;background:transparent;border:none;border-left:2px solid transparent;color:var(--t3);font-family:var(--S);font-size:11px;cursor:pointer;text-align:left;transition:all .12s}
.sbt:hover{background:rgba(255,255,255,.02);color:var(--t2)}
.sbt.ac{background:rgba(201,165,92,.04);color:var(--gold);border-left-color:var(--gold)}
.sbt.acw{background:rgba(123,168,123,.04);color:var(--wg);border-left-color:var(--wg)}
.sbt.acad{background:rgba(224,112,112,.04);color:var(--adm);border-left-color:var(--adm)}
.sn{font-size:8px;color:var(--t4);min-width:24px;font-family:var(--M);flex-shrink:0}
.pv{flex:1;display:flex;align-items:stretch;overflow:hidden;background:var(--s1)}
.es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.pc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 20px;flex-shrink:0;border-right:1px solid var(--bd)}
.plbl{font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--t4);margin-bottom:10px;font-family:var(--M)}
.dev{width:252px;background:#050507;border-radius:42px;border:1.5px solid #191921;padding:8px;box-shadow:0 0 0 1px #0A0A0D,0 32px 60px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.03)}
.isl{width:72px;height:18px;background:#050507;border-radius:9px;margin:0 auto 7px;border:1px solid #141418}
.dscr{border-radius:28px;overflow:hidden;height:504px;background:#090909;position:relative}
.chin{display:flex;justify-content:center;padding:7px 0 2px}
.hib{width:68px;height:3px;background:#18181e;border-radius:2px}
.snl{margin-top:9px;font-family:var(--F);font-size:11px;font-style:italic;color:var(--t3);text-align:center;max-width:252px}
.wf{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd)}
.wfbar{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--s2);flex-shrink:0}
.wfd{width:9px;height:9px;border-radius:50%}
.wfurl{flex:1;background:var(--s3);border:1px solid var(--bd);border-radius:3px;padding:3px 9px;font-size:9px;color:var(--t3);font-family:var(--M)}
.wfbody{flex:1;overflow-y:auto;background:var(--s1);scrollbar-width:thin;scrollbar-color:var(--s4) transparent}
.wfbody::-webkit-scrollbar{width:2px}
.dc{flex:1;overflow-y:auto;padding:24px 26px;scrollbar-width:thin;scrollbar-color:var(--s4) transparent;min-width:240px;max-width:286px}
.dc::-webkit-scrollbar{width:2px}
.dnum{font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;font-family:var(--M)}
.dtit{font-family:var(--F);font-size:21px;color:var(--t1);margin-bottom:4px;line-height:1.25}
.dtag{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:2px;margin-bottom:14px;font-family:var(--M)}
.drule{width:26px;height:1px;margin:0 0 14px}
.dsec{margin-bottom:14px}
.dstit{font-size:8px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--bd);margin-bottom:8px;font-family:var(--M)}
.dit{display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.02);font-size:10px;color:var(--t2);line-height:1.55}
.dit:last-child{border-bottom:none}
.dbul{width:3px;height:3px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dleads{background:var(--s2);border:1px solid var(--bd);border-radius:2px;padding:9px 12px;display:flex;align-items:center;gap:8px;margin-top:4px}
.dll{font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);white-space:nowrap;font-family:var(--M)}
.dlv{font-size:10px;color:var(--t2);font-style:italic}
.tnote{border-radius:2px;padding:8px 11px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="app">
<header class="hdr">
  <div class="logo">
    <span class="wm">trouvétoi</span>
    <div class="sep"></div>
    <span class="ltag">Screen Navigator · 46 screens × 3 tiers · Real Unsplash images</span>
  </div>
  <nav class="tnav">
    <button class="np na" id="np-mobile" onclick="setJ('mobile')">Mobile App</button>
    <button class="np" id="np-web" onclick="setJ('web')">Pre-Reg Web</button>
    <button class="np" id="np-admin" onclick="setJ('admin')">Admin Panel</button>
  </nav>
</header>
<div class="body">
  <aside class="sb">
    <div class="tstrip" id="tstrip">
      <button class="tb ta" id="tb-s" onclick="setT('s')">Standard</button>
      <button class="tb" id="tb-g" onclick="setT('g')">Gold</button>
      <button class="tb" id="tb-p" onclick="setT('p')">Platinum</button>
    </div>
    <div class="sl" id="sl"></div>
  </aside>
  <div class="pv" id="pv">
    <div class="es" id="es">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" opacity=".15"><path d="M4 24L14 4l10 20" stroke="#C9A55C" stroke-width="1.3" stroke-linecap="round"/><path d="M7 17h14" stroke="#C9A55C" stroke-width="1.3" stroke-linecap="round"/></svg>
      <p style="font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:#2A2826">Select a screen to preview</p>
      <p style="font-size:9px;color:#2A2826;letter-spacing:.06em">Switch tiers with the Gold / Platinum buttons to see per-tier differences</p>
    </div>
    <div id="phone-col" class="pc" style="display:none">
      <div class="plbl" id="plbl">Mobile App</div>
      <div class="dev"><div class="isl"></div><div class="dscr" id="dscr"></div><div class="chin"><div class="hib"></div></div></div>
      <div class="snl" id="snl"></div>
    </div>
    <div id="web-col" class="wf" style="display:none">
      <div class="wfbar">
        <div style="display:flex;gap:4px"><div class="wfd" style="background:#FF5F57"></div><div class="wfd" style="background:#FEBC2E"></div><div class="wfd" style="background:#28C840"></div></div>
        <div class="wfurl" id="wfurl">trouvetoi.com</div>
      </div>
      <div class="wfbody" id="wfbody"></div>
    </div>
    <div id="dc" class="dc" style="display:none"></div>
  </div>
</div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   TROUVÉTOI COMPLETE NAVIGATOR
   46 screens rendered dynamically per tier (Standard / Gold / Platinum)
   Real Unsplash womens fashion images on every screen
══════════════════════════════════════════════════════════ */

var J='mobile', T='s', CID=null;

/* ─── REAL UNSPLASH IMAGE MAP ─── */
/* All IDs confirmed from Unsplash search — free to use under Unsplash License */
var U='https://images.unsplash.com/photo-';
var I={
  /* Hero / full-bleed editorial */
  h1: U+'1469334031218-e382a71b716b?w=700&q=82&fit=crop',   /* woman black coat editorial */
  h2: U+'1515886657613-9f3515b0c78f?w=700&q=82&fit=crop',   /* fashion editorial standing */
  h3: U+'1529139574466-a303027c1d8b?w=700&q=82&fit=crop',   /* dark editorial moody */
  h4: U+'1581044777550-4cfa60707c03?w=700&q=82&fit=crop',   /* woman long trench */
  h5: U+'1550614000-4895a10e1bfd?w=700&q=82&fit=crop',      /* editorial studio light */
  h6: U+'1520975916090-3105956dac38?w=700&q=82&fit=crop',   /* luxury collection editorial */
  /* Splash/Login/Greeting hero */
  sp: U+'1469334031218-e382a71b716b?w=900&q=85&fit=crop&crop=top',
  lg: U+'1515886657613-9f3515b0c78f?w=900&q=85&fit=crop&crop=top',
  gr: U+'1529139574466-a303027c1d8b?w=900&q=85&fit=crop',
  /* Product shots */
  p1: U+'1539008835657-9e8e9680c956?w=500&q=80&fit=crop',   /* woman in coat */
  p2: U+'1603252109303-2751441dd157?w=500&q=80&fit=crop',   /* silk dress */
  p3: U+'1551698618-1dfe5d97d256?w=500&q=80&fit=crop',      /* knit sweater */
  p4: U+'1519238263530-99bdd11df2ea?w=500&q=80&fit=crop',   /* trench coat woman */
  p5: U+'1548036328-c9fa89d128fa?w=500&q=80&fit=crop',      /* handbag */
  p6: U+'1564584217132-2271feaeb3c5?w=500&q=80&fit=crop',   /* wide leg trousers */
  p7: U+'1566206091558-7f218b696731?w=500&q=80&fit=crop',   /* silk scarf accessories */
  p8: U+'1509631179647-0177331693ae?w=500&q=80&fit=crop',   /* fashion editorial model */
  p9: U+'1483985988355-763728e1935b?w=500&q=80&fit=crop',   /* luxury shopping bags */
  /* Drop / collection */
  d1: U+'1581044777550-4cfa60707c03?w=700&q=82&fit=crop',   /* drop hero */
  d2: U+'1520975916090-3105956dac38?w=700&q=82&fit=crop',   /* private collection hero */
  /* Feed */
  f1: U+'1469334031218-e382a71b716b?w=800&q=82&fit=crop&crop=top', /* feed full screen */
  /* Web hero */
  w1: U+'1515886657613-9f3515b0c78f?w=900&q=85&fit=crop&crop=top'
};

/* ─── HELPERS ─── */
function go(id){selectScreen(id);}
function ac(){return J==='admin'?'#E07070':J==='web'?'#7BA87B':T==='p'?'#8BAED4':T==='g'?'#C9A55C':'#B4AFA8';}
function tc(){return T==='p'?'Platinum':T==='g'?'Gold':'Standard';}

/* Image tag with fallback gradient */
function img(src,h,extra,ob){
  ob=ob||'center';
  /* Wrapper always provides the height context */
  var wh=(extra&&extra.indexOf('absolute')>=0)?'100%':h+'px';
  var wex=(extra&&extra.indexOf('absolute')>=0)?'position:absolute;inset:0;':'';
  return '<div style="'+wex+'position:relative;width:100%;height:'+wh+';overflow:hidden;background:#0E0E11;flex-shrink:0">'    +'<img src="'+src+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:'+ob+'" referrerpolicy="no-referrer">'    +'</div>';
}

function stbar(){
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 16px 2px">'
    +'<span style="font-size:10px;color:rgba(232,228,220,.5);font-family:\'JetBrains Mono\',monospace">9:41</span>'
    +'<div style="display:flex;gap:3px;align-items:flex-end">'
    +'<div style="width:2px;height:4px;background:rgba(232,228,220,.3);border-radius:1px"></div>'
    +'<div style="width:2px;height:6px;background:rgba(232,228,220,.3);border-radius:1px"></div>'
    +'<div style="width:2px;height:8px;background:rgba(232,228,220,.3);border-radius:1px"></div>'
    +'<div style="width:2px;height:10px;background:rgba(232,228,220,.3);border-radius:1px"></div>'
    +'</div></div>';
}

function gbtn(txt,fn,bg,fg){
  bg=bg||'#C9A55C'; fg=fg||'#09090B';
  return '<button style="width:100%;padding:12px;background:'+bg+';border:none;color:'+fg
    +';font-family:\'Jost\',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer"'
    +(fn?' onclick="'+fn+'"':'')+'>'+txt+'</button>';
}
function gsbtn(txt,fn){
  return '<button style="width:100%;padding:11px;background:transparent;border:1px solid rgba(255,255,255,.1);color:#8A8680'
    +';font-family:\'Jost\',sans-serif;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer"'
    +(fn?' onclick="'+fn+'"':'')+'>'+txt+'</button>';
}
function bdg(t,c){
  c=c||ac();
  return '<span style="display:inline-block;background:'+c+'14;color:'+c+';border:1px solid '+c+'26'
    +';font-size:7px;padding:2px 7px;border-radius:2px;letter-spacing:.08em;font-weight:600;text-transform:uppercase;font-family:\'JetBrains Mono\',monospace">'+t+'</span>';
}
function tbdg(){return T==='p'?bdg('Platinum','#8BAED4'):T==='g'?bdg('Gold','#C9A55C'):bdg('Standard','#B4AFA8');}
function drow(l,v){
  return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)">'
    +'<span style="font-size:9px;color:#4A4844">'+l+'</span><span style="font-size:9px;color:#8A8680">'+v+'</span></div>';
}
function bbtn(l,sc){
  return '<div style="display:flex;align-items:center;gap:4px;margin-bottom:12px;cursor:pointer" onclick="go(\''+sc+'\')">'
    +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4A4844" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>'
    +'<span style="font-size:9px;color:#4A4844">'+l+'</span></div>';
}
function fld(l,v,act){
  return '<div style="margin-bottom:13px"><div style="font-size:8px;color:#3A3835;letter-spacing:.12em;text-transform:uppercase;font-family:\'JetBrains Mono\',monospace;margin-bottom:5px">'+l+'</div>'
    +'<div style="font-size:11px;color:'+(act?'#E8E4DC':'#2A2826')+';padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,'+(act?.1:.04)+')">'+v+'</div></div>';
}
function bnav(active){
  var ns=[{k:'home',l:'Home',d:'M3 9l9-7 9 7v10H15v-5H9v5H3z',sc:'M-05-'+T},
    {k:'feed',l:'Feed',d:'M3 9l9-7 9 7v10H15v-5H9v5H3',sc:'M-08'},
    {k:'discover',l:'Discover',d:'M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35',sc:'M-10'},
    {k:'activity',l:'Activity',d:'M20 12V22H4V12M22 7H2v5h20V7z',sc:'M-16'},
    {k:'profile',l:'Profile',d:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z',sc:'M-25'}];
  var h='<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(9,9,11,.97);border-top:1px solid rgba(255,255,255,.05);display:flex;padding:5px 0 8px;z-index:10">';
  ns.forEach(function(n){
    var isA=(n.k===active),c=isA?ac():'#2A2826';
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:2px 0" onclick="go(\''+n.sc+'\')">'
      +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="'+(isA?'1.8':'1.4')+'" stroke-linecap="round" stroke-linejoin="round"><path d="'+n.d+'"/></svg>'
      +'<span style="font-size:7px;letter-spacing:.05em;font-weight:500;text-transform:uppercase;color:'+c+'">'+n.l+'</span></div>';
  });
  return h+'</div>';
}
function tierbar(){
  if(T==='s') return '';
  var c=T==='p'?'#8BAED4':'#C9A55C';
  return '<div style="position:absolute;top:0;left:0;right:0;z-index:20;padding:3px 12px;background:'+c+'0D;border-bottom:1px solid '+c+'18;display:flex;align-items:center;gap:5px">'
    +'<div style="width:3px;height:3px;border-radius:50%;background:'+c+';flex-shrink:0"></div>'
    +'<span style="font-size:7px;font-weight:600;color:'+c+';letter-spacing:.1em;text-transform:uppercase;font-family:\'JetBrains Mono\',monospace">'+(T==='p'?'PLATINUM TIER':'GOLD TIER')+'</span></div>';
}
/* Product card for grids */
function pcard(src,name,price,sc,height){
  height=height||155;
  var id=sc||'M-14';
  return '<div onclick="go(\''+id+'\');" style="cursor:pointer;flex-shrink:0;width:108px">'    +'<div style="width:108px;height:'+height+'px;overflow:hidden;background:#0E0E11;flex-shrink:0;position:relative">'    +'<img src="'+src+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" referrerpolicy="no-referrer">'    +'</div>'    +'<div style="padding:5px 0 2px"><div style="font-size:9px;color:#6A6664;margin-bottom:1px">'+name+'</div>'    +'<div style="font-size:9px;color:'+ac()+'">'+price+'</div></div></div>';
}
/* Horizontal scroll product */
function hcard(src,name,price,w){
  w=w||112;
  return '<div onclick="go(\'M-14\');" style="flex-shrink:0;width:'+w+'px;cursor:pointer">'    +'<div style="width:'+w+'px;height:'+(w+20)+'px;overflow:hidden;background:#0E0E11;position:relative">'    +'<img src="'+src+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" referrerpolicy="no-referrer">'    +'</div>'    +'<div style="padding:4px 0 2px"><div style="font-size:8px;color:#6A6664;margin-bottom:1px">'+name+'</div>'    +'<div style="font-size:8px;color:'+ac()+'">'+price+'</div></div></div>';
}

/* Back arrow button overlaid on image */
function backBtn(to){
  return '<div onclick="go(\''+to+'\')" style="position:absolute;top:11px;left:13px;cursor:pointer;z-index:5;background:rgba(0,0,0,.45);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center">'
    +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(232,228,220,.85)" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></div>';
}

/* ═══════════════════════════════════════
   SCREEN DEFINITIONS
═══════════════════════════════════════ */
var S={};

/* ═══════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════ */
function getSecs(){
  if(J==='mobile') return T==='g'?DATA.mobile.g:T==='p'?DATA.mobile.p:DATA.mobile.s;
  return J==='web'?DATA.web.x:DATA.admin.x;
}
function selCls(){return J==='admin'?'sbt acad':J==='web'?'sbt acw':'sbt ac';}

function renderSB(){
  var secs=getSecs(),h='';
  /* Tier indicator strip in sidebar when on Gold/Platinum */
  if(J==='mobile'&&T!=='s'){
    var tc2=T==='p'?'#8BAED4':'#C9A55C';
    h+='<div style="padding:6px 14px;background:'+tc2+'08;border-bottom:1px solid '+tc2+'14"><span style="font-size:8px;color:'+tc2+';letter-spacing:.1em;font-family:\'JetBrains Mono\',monospace;font-weight:600">'+(T==='p'?'PLATINUM':'GOLD')+' VIEW — all 31 screens with tier differences</span></div>';
  }
  for(var s in secs){
    h+='<div class="sh">'+s+'</div>';
    secs[s].forEach(function(item){
      var sc=S[item.id]; if(!sc) return;
      var sel=CID===item.id;
      h+='<button class="'+(sel?selCls():'sbt')+'" data-id="'+item.id+'" onclick="selectScreen(this.getAttribute(\'data-id\'))">'
        +'<span class="sn">'+item.id+'</span>'
        +'<div style="width:3px;height:3px;border-radius:50%;flex-shrink:0;background:'+ac()+'"></div>'
        +sc.n+'</button>';
    });
  }
  document.getElementById('sl').innerHTML=h;
}

function renderDetail(id,sc){
  var a=ac();
  var h='<div class="dnum" style="color:'+a+'">'+id+'</div>'
    +'<div class="dtit">'+sc.n+'</div>';
  /* Tier badge in detail panel */
  var tabText=sc.tab||J.toUpperCase();
  if(J==='mobile'&&T!=='s') tabText+=' · '+(T==='p'?'Platinum':'Gold');
  h+='<div class="dtag" style="background:'+a+'12;border:1px solid '+a+'22;color:'+a+'">'+tabText+'</div>'
    +'<div class="drule" style="background:'+a+'35"></div>';
  if(J==='mobile'&&T!=='s'){
    var tc3=T==='p'?'#8BAED4':'#C9A55C';
    h+='<div class="tnote" style="background:'+tc3+'0A;border:1px solid '+tc3+'18"><div style="width:3px;height:3px;border-radius:50%;background:'+tc3+';flex-shrink:0"></div>'
      +'<span style="font-size:9px;color:'+tc3+'">'+(T==='p'?'Platinum: all features unlocked — Hold 48hr, 72hr drops, full collections, concierge':'Gold: drops unlocked, priority access, 24hr window, partial collection view')+'</span></div>';
  }
  if(sc.info&&sc.info.length){
    h+='<div class="dsec"><div class="dstit" style="color:'+a+'">Contains</div>';
    sc.info.forEach(function(c){h+='<div class="dit"><div class="dbul" style="background:'+a+'"></div><span>'+c+'</span></div>';});
    h+='</div>';
  }
  if(sc.acts&&sc.acts.length){
    h+='<div class="dsec"><div class="dstit" style="color:'+a+'">User actions</div>';
    sc.acts.forEach(function(c){h+='<div class="dit"><div class="dbul" style="background:'+a+'55"></div><span>'+c+'</span></div>';});
    h+='</div>';
  }
  if(sc.leads){
    h+='<div class="dleads"><span class="dll">Leads to</span><span class="dlv">→ '+sc.leads+'</span></div>';
  }
  document.getElementById('dc').innerHTML=h;
}

function selectScreen(id){
  var sc=S[id]; if(!sc) return; CID=id;
  renderSB();
  var isWeb=sc.web===true;
  document.getElementById('es').style.display='none';
  var ph=document.getElementById('phone-col');
  var wc=document.getElementById('web-col');
  var dcEl=document.getElementById('dc');
  if(isWeb){
    ph.style.display='none';
    wc.style.display='flex';
    if(sc.url) document.getElementById('wfurl').textContent=sc.url;
    document.getElementById('wfbody').innerHTML=sc.r();
    dcEl.style.display='block';
    renderDetail(id,sc);
  } else {
    wc.style.display='none';
    ph.style.display='flex';
    document.getElementById('dscr').innerHTML=sc.r();
    document.getElementById('snl').textContent=sc.n+(J==='mobile'&&T!=='s'?' ('+(T==='p'?'Platinum':'Gold')+')':'');
    dcEl.style.display='block';
    renderDetail(id,sc);
  }
}

function setJ(j){
  J=j; T='s'; CID=null;
  document.querySelectorAll('.np').forEach(function(b){b.className='np';});
  var m={'mobile':'na','web':'nw','admin':'nad'};
  document.getElementById('np-'+j).classList.add(m[j]);
  document.getElementById('tstrip').style.display=j==='mobile'?'flex':'none';
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('ta','tp');});
  if(j==='mobile') document.getElementById('tb-s').classList.add('ta');
  document.getElementById('plbl').textContent=j==='mobile'?'Mobile App':j==='web'?'Pre-Reg Web':'Admin Panel';
  document.getElementById('es').style.display='flex';
  document.getElementById('phone-col').style.display='none';
  document.getElementById('web-col').style.display='none';
  document.getElementById('dc').style.display='none';
  renderSB();
}

function setT(t){
  T=t; CID=null;
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('ta','tp');});
  if(t==='p') document.getElementById('tb-p').classList.add('tp');
  else document.getElementById('tb-'+t).classList.add('ta');
  /* Refresh current screen if one is selected */
  if(CID&&S[CID]&&!S[CID].web){
    selectScreen(CID);
  } else {
    document.getElementById('es').style.display='flex';
    document.getElementById('phone-col').style.display='none';
    document.getElementById('dc').style.display='none';
    renderSB();
  }
}

/* Init */
renderSB();
</script>
