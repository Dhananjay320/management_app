<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Avadeti Team — Screen Navigator — Complete UX Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F2F7;--s1:#FFFFFF;--s2:#F8FAFC;--s3:#EEF2F7;--s4:#E2E8F0;
  --bd:rgba(0,0,0,.08);--t1:#1E293B;--t2:#475569;--t3:#94A3B8;--t4:#CBD5E1;
  --pri:#6366F1;--pri-l:#818CF8;--pri-bg:rgba(99,102,241,.08);
  --grn:#10B981;--grn-bg:rgba(16,185,129,.08);
  --amb:#F59E0B;--amb-bg:rgba(245,158,11,.08);
  --red:#EF4444;--red-bg:rgba(239,68,68,.08);
  --pur:#8B5CF6;--pur-bg:rgba(139,92,246,.08);
  --cyn:#06B6D4;--cyn-bg:rgba(6,182,212,.08);
  --org:#F97316;--org-bg:rgba(249,115,22,.08);
  --pnk:#EC4899;--pnk-bg:rgba(236,72,153,.08);
  --F:'Inter',sans-serif;--M:'JetBrains Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.04);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--F);font-size:13px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}

/* ─── APP SHELL ─── */
.app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1);box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--pri),var(--pur));border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.logo-text{font-size:16px;font-weight:700;color:var(--t1)}
.logo-text span{color:var(--pri)}
.sep{width:1px;height:16px;background:var(--bd);margin:0 8px}
.ltag{font-size:8px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;font-family:var(--M)}
.mode-strip{display:flex;gap:3px;background:var(--s3);padding:3px;border-radius:var(--radius-sm)}
.mode-btn{padding:5px 14px;border:none;border-radius:var(--radius-xs);background:transparent;color:var(--t3);font-family:var(--F);font-size:10px;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all .2s}
.mode-btn:hover{color:var(--t2)}
.mode-btn.active{background:var(--s1);color:var(--pri);box-shadow:var(--shadow)}
.mode-btn.admin-active{background:var(--s1);color:var(--org);box-shadow:var(--shadow)}

/* ─── BODY ─── */
.body{display:flex;flex:1;overflow:hidden}

/* ─── SIDEBAR ─── */
.sb{width:256px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--bd);background:var(--s1);overflow:hidden}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--bd)}
.sb-search input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--s4);border-radius:var(--radius-xs);background:var(--s2);font-size:11px;font-family:var(--F);color:var(--t1);outline:none;transition:border-color .2s;background-image:url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2394A3B8' stroke-width='2' stroke-linecap='round' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='m21 21-4.35-4.35'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:9px center}
.sb-search input:focus{border-color:var(--pri);background-color:#fff}
.sb-search input::placeholder{color:var(--t4)}
.sl{flex:1;overflow-y:auto;padding:6px 0 16px}
.sh{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t4);padding:14px 14px 5px;font-family:var(--M)}
.sbt{display:flex;align-items:center;gap:8px;width:100%;padding:7px 14px;background:transparent;border:none;border-left:3px solid transparent;color:var(--t2);font-family:var(--F);font-size:11.5px;font-weight:500;cursor:pointer;text-align:left;transition:all .15s}
.sbt:hover{background:var(--pri-bg);color:var(--pri)}
.sbt.ac{background:var(--pri-bg);color:var(--pri);border-left-color:var(--pri);font-weight:600}
.sbt .sn{font-size:8px;color:var(--t4);min-width:28px;font-family:var(--M);flex-shrink:0}
.sbt .si{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-xs);flex-shrink:0;font-size:11px}
.screen-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:16px;padding:0 4px;border-radius:10px;background:var(--s3);color:var(--t3);font-size:9px;font-weight:600;margin-left:auto;font-family:var(--M)}

/* ─── PREVIEW ─── */
.pv{flex:1;display:flex;overflow:hidden;background:var(--bg);padding:16px;gap:16px}
.es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--s1);border-radius:var(--radius);border:1px solid var(--bd)}
.es-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--pri-bg),var(--pur-bg));border-radius:16px;display:flex;align-items:center;justify-content:center}

/* Desktop Frame */
.desk-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.desk-frame{flex:1;display:flex;flex-direction:column;background:var(--s1);border-radius:var(--radius);border:1px solid var(--bd);box-shadow:var(--shadow-lg);overflow:hidden}
.desk-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--s2);flex-shrink:0}
.desk-dots{display:flex;gap:5px}
.desk-dot{width:10px;height:10px;border-radius:50%}
.desk-url{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:var(--radius-xs);padding:4px 10px;font-size:10px;color:var(--t3);font-family:var(--M)}
.desk-body{flex:1;overflow-y:auto;background:#fff}
.desk-label{text-align:center;padding:8px 0 0;font-size:10px;color:var(--t3);font-weight:500}

/* ─── DOCS PANEL ─── */
.dc{width:280px;flex-shrink:0;overflow-y:auto;padding:20px;background:var(--s1);border-radius:var(--radius);border:1px solid var(--bd);box-shadow:var(--shadow)}
.dnum{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;font-family:var(--M);color:var(--pri)}
.dtit{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:4px;line-height:1.3}
.dtag{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:var(--radius-xs);margin-bottom:14px;font-family:var(--M)}
.dsec{margin-bottom:14px}
.dstit{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--bd);margin-bottom:7px;font-family:var(--M);color:var(--t3)}
.dit{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:11px;color:var(--t2);line-height:1.6}
.dbul{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dleads{background:var(--s2);border:1px solid var(--bd);border-radius:var(--radius-xs);padding:9px 12px;display:flex;align-items:center;gap:8px;margin-top:4px}
.dll{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t4);white-space:nowrap;font-family:var(--M)}
.dlv{font-size:11px;color:var(--pri);font-weight:500;cursor:pointer}
.dlv:hover{text-decoration:underline}

/* ─── SCREEN CONTENT STYLES ─── */
.scr{font-family:var(--F);overflow-y:auto;height:100%}

/* App sidebar mock */
.app-sb{width:56px;background:#1E293B;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;flex-shrink:0}
.app-sb-logo{width:36px;height:36px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;margin-bottom:12px}
.app-sb-item{width:40px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);cursor:pointer;transition:all .15s;position:relative}
.app-sb-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.app-sb-item.active{background:rgba(99,102,241,.2);color:#818CF8}
.app-sb-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;background:#EF4444;border-radius:50%;border:2px solid #1E293B}

/* Top bar mock */
.app-top{height:48px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#fff;flex-shrink:0}
.app-top-left{display:flex;align-items:center;gap:10px}
.app-top-title{font-size:14px;font-weight:700;color:#1E293B}
.app-top-sub{font-size:11px;color:#94A3B8}
.app-top-right{display:flex;align-items:center;gap:8px}
.app-top-btn{padding:5px 12px;border-radius:6px;border:1px solid #E2E8F0;background:#fff;font-size:10px;font-weight:600;color:#475569;cursor:pointer}
.app-top-btn.primary{background:#6366F1;border-color:#6366F1;color:#fff}
.app-top-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#EC4899);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}

/* Shared inner components */
.card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:.02em}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:10px;flex-shrink:0}
.input-mock{width:100%;padding:8px 12px;border:1px solid #E2E8F0;border-radius:8px;background:#F8FAFC;font-size:11px;color:#94A3B8}
.btn-pri{padding:8px 16px;background:#6366F1;border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:600;cursor:pointer}
.btn-sec{padding:8px 16px;background:#fff;border:1px solid #E2E8F0;border-radius:8px;color:#475569;font-size:11px;font-weight:600;cursor:pointer}
.progress-bar{height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.tab-bar{display:flex;gap:2px;padding:4px;background:#F0F2F7;border-radius:8px;margin-bottom:12px}
.tab-item{padding:6px 14px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;color:#94A3B8;transition:all .15s}
.tab-item.active{background:#fff;color:#6366F1;box-shadow:0 1px 2px rgba(0,0,0,.06)}
</style>
</head>
<body>
<div class="app">
<header class="hdr">
  <div style="display:flex;align-items:center">
    <div class="logo">
      <div class="logo-icon">A</div>
      <div class="logo-text">Avadeti <span>Team</span></div>
    </div>
    <div class="sep"></div>
    <span class="ltag" id="screen-counter">Screen Navigator · 0 screens</span>
  </div>
  <div class="mode-strip">
    <button class="mode-btn active" id="mode-emp" onclick="setMode('emp')">👤 Employee</button>
    <button class="mode-btn" id="mode-admin" onclick="setMode('admin')">🛡️ Admin</button>
  </div>
</header>
<div class="body">
  <aside class="sb">
    <div class="sb-search"><input type="text" placeholder="Search screens..." id="sb-search" oninput="filterScreens(this.value)"></div>
    <div class="sl" id="sl"></div>
  </aside>
  <div class="pv" id="pv">
    <div class="es" id="es">
      <div class="es-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <div style="text-align:center">
        <p style="font-size:15px;font-weight:600;color:var(--t1);margin-bottom:4px">Select a screen to preview</p>
        <p style="font-size:11px;color:var(--t3)">Browse sections in the sidebar or search by name</p>
      </div>
    </div>
  </div>
</div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   AVADETI TEAM — COMPLETE SCREEN NAVIGATOR
   Joyful light theme · Desktop-first · Employee + Admin modes
══════════════════════════════════════════════════════════ */

var MODE='emp', CID=null;

/* ─── COLORS ─── */
var C={
  pri:'#6366F1',priL:'#818CF8',priBg:'rgba(99,102,241,.08)',
  grn:'#10B981',grnBg:'rgba(16,185,129,.08)',
  amb:'#F59E0B',ambBg:'rgba(245,158,11,.08)',
  red:'#EF4444',redBg:'rgba(239,68,68,.08)',
  pur:'#8B5CF6',purBg:'rgba(139,92,246,.08)',
  cyn:'#06B6D4',cynBg:'rgba(6,182,212,.08)',
  org:'#F97316',orgBg:'rgba(249,115,22,.08)',
  pnk:'#EC4899',pnkBg:'rgba(236,72,153,.08)',
  t1:'#1E293B',t2:'#475569',t3:'#94A3B8',t4:'#CBD5E1',
  bg:'#F0F2F7',white:'#FFFFFF',card:'#F8FAFC',border:'#E2E8F0'
};

/* ─── ICONS (SVG paths) ─── */
function icon(name,size,color){
  size=size||16;color=color||C.t3;
  var paths={
    calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>',
    chat:'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
    task:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
    users:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>',
    clock:'<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
    mail:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/>',
    folder:'<path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>',
    meeting:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>',
    sticky:'<path d="M15.5 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8.5L15.5 3z"/><path d="M14 3v6h6"/>',
    bell:'<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>',
    search:'<circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>',
    dollar:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>',
    spark:'<path d="M12 2L9 12l-7 3 7 3 3 10 3-10 7-3-7-3z"/>',
    shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
    settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>',
    activity:'<path d="M14.5 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7.5L14.5 2z"/><path d="M14 2v6h6"/><path d="M12 18v-6M9 15l3 3 3-3"/>',
    feed:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
    home:'<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/>',
    lock:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>',
    chart:'<path d="M18 20V10M12 20V4M6 20v-6"/>',
    check:'<path d="M20 6L9 17l-5-5"/>',
    pin:'<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/>',
    file:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>',
    video:'<path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>',
    star:'<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>'
  };
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+(paths[name]||'')+'</svg>';
}

/* ─── HELPERS ─── */
function go(id){selectScreen(id)}

function bdg(t,bg,fg){
  bg=bg||C.priBg;fg=fg||C.pri;
  return '<span style="display:inline-flex;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:.02em;background:'+bg+';color:'+fg+'">'+t+'</span>';
}

function avatar(initials,bg,size){
  size=size||28;bg=bg||'linear-gradient(135deg,#6366F1,#EC4899)';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+bg+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:'+(size*0.38)+'px;flex-shrink:0">'+initials+'</div>';
}

function appSidebar(active){
  var items=[
    {k:'calendar',i:'calendar',l:'Calendar',c:'C-01'},
    {k:'attendance',i:'clock',l:'Attend',c:'AT-01'},
    {k:'messages',i:'chat',l:'Messages',c:'M-01'},
    {k:'tasks',i:'task',l:'Tasks',c:'T-01'},
    {k:'workspace',i:'folder',l:'Workspace',c:'W-01'},
    {k:'meetings',i:'meeting',l:'Meetings',c:'MT-01'},
    {k:'email',i:'mail',l:'Email',c:'E-01'},
    {k:'sticky',i:'sticky',l:'Notes',c:'SN-01'},
    {k:'activity',i:'activity',l:'Activity',c:'DA-01'},
    {k:'feed',i:'feed',l:'Feed',c:'TF-01'},
    {k:'salary',i:'dollar',l:'Salary',c:'SA-01'},
    {k:'notifs',i:'bell',l:'Alerts',c:'N-01'}
  ];
  var h='<div class="app-sb"><div class="app-sb-logo">A</div>';
  items.forEach(function(it){
    var isA=it.k===active;
    h+='<div class="app-sb-item'+(isA?' active':'')+'" onclick="go(\''+it.c+'\')" title="'+it.l+'">'
      +icon(it.i,18,isA?'#818CF8':'rgba(255,255,255,.4)')
      +(it.k==='notifs'?'<div class="app-sb-badge"></div>':'')
      +'</div>';
  });
  return h+'</div>';
}

function topBar(title,subtitle,buttons){
  buttons=buttons||'';
  var h='<div class="app-top"><div class="app-top-left">'
    +'<div class="app-top-title">'+title+'</div>'
    +(subtitle?'<div class="app-top-sub">'+subtitle+'</div>':'')
    +'</div><div class="app-top-right">'
    +buttons
    +avatar('RK')
    +'</div></div>';
  return h;
}

function deskLayout(sidebar,topbar,content){
  return '<div style="display:flex;height:100%;font-family:Inter,sans-serif">'
    +sidebar

function taskCard(title,assignee,priority,status,progress,deadline){
  var pc={top:'#EF4444',high:'#F97316',medium:'#F59E0B',low:'#10B981'};
  var sc={ns:'#94A3B8',ip:'#6366F1',oh:'#F59E0B',done:'#10B981',cancel:'#EF4444',reopen:'#F97316'};
  var sl={ns:'Not Started',ip:'In Progress',oh:'On Hold',done:'Done',cancel:'Cancelled',reopen:'Reopened'};
  var col=pc[priority]||C.pri;
  var scol=sc[status]||C.t3;
  return '<div style="background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:12px;border-left:3px solid '+col+';margin-bottom:8px">'
    +'<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:6px">'
    +'<div style="font-size:12px;font-weight:600;color:#1E293B">'+title+'</div>'
    +bdg(sl[status]||status,scol+'14',scol)
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
    +avatar(assignee,null,22)
    +'<span style="font-size:10px;color:#94A3B8">'+deadline+'</span>'
    +'</div>'
    +'<div class="progress-bar"><div class="progress-fill" style="width:'+progress+'%;background:'+col+'"></div></div>'
    +'<div style="text-align:right;font-size:9px;color:#94A3B8;margin-top:2px">'+progress+'%</div>'
    +'</div>';
}

/* ═══════════════════════════════════════
   NAVIGATION ENGINE
═══════════════════════════════════════ */

function setMode(m){
  MODE=m;
  document.getElementById('mode-emp').className='mode-btn'+(m==='emp'?' active':'');
  document.getElementById('mode-admin').className='mode-btn'+(m==='admin'?' admin-active':'');
  buildSidebar();
  if(CID && S[CID] && S[CID].mode==='admin' && m!=='admin') selectScreen(null);
  else if(CID) selectScreen(CID);
}

function buildSidebar(){
  var sl=document.getElementById('sl');
  var tabs={};
  var order=['Auth','Onboarding','Calendar','Attendance','Messaging','Tasks','Workspace','Meetings','Email','Sticky Notes','Daily Activity','Team Feed','Salary','Notifications','Search','AI Features','Admin'];
  Object.keys(S).forEach(function(k){
    var s=S[k];
    if(s.mode==='admin' && MODE!=='admin') return;
    if(!tabs[s.t]) tabs[s.t]=[];
    tabs[s.t].push({id:k,name:s.n});
  });
  var h='';
  order.forEach(function(tab){
    if(!tabs[tab]) return;
    var isAdmin=tab==='Admin';
    h+='<div class="sh"'+(isAdmin?' style="color:#F97316"':'')+'>'+(isAdmin?'🛡️ ':'')+tab+'</div>';
    tabs[tab].forEach(function(s){
      h+='<button class="sbt'+(CID===s.id?' ac':'')+'" onclick="go(\''+s.id+'\')">'
        +'<span class="sn">'+s.id+'</span>'
        +'<span>'+s.name+'</span></button>';
    });
  });
  sl.innerHTML=h;
  var total=Object.keys(S).filter(function(k){return S[k].mode!=='admin'||MODE==='admin'}).length;
  document.getElementById('screen-counter').textContent='Screen Navigator · '+total+' screens';
}

function selectScreen(id){
  CID=id;
  buildSidebar();
  var pv=document.getElementById('pv');
  if(!id||!S[id]){
    pv.innerHTML='<div class="es" id="es"><div class="es-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div><div style="text-align:center"><p style="font-size:15px;font-weight:600;color:#1E293B;margin-bottom:4px">Select a screen to preview</p><p style="font-size:11px;color:#94A3B8">Browse sections in the sidebar or search by name</p></div></div>';
    return;
  }
  var s=S[id];
  var h='<div class="desk-wrap"><div class="desk-frame"><div class="desk-bar">'
    +'<div class="desk-dots"><div class="desk-dot" style="background:#FF5F57"></div><div class="desk-dot" style="background:#FEBC2E"></div><div class="desk-dot" style="background:#28C840"></div></div>'
    +'<div class="desk-url">app.avadetiteam.com / '+s.t.toLowerCase().replace(/ /g,'-')+' / '+s.n.toLowerCase().replace(/ /g,'-')+'</div></div>'
    +'<div class="desk-body">'+s.r()+'</div></div>'
    +'<div class="desk-label">'+s.n+' — '+s.t+'</div></div>';

  /* Doc panel */
  var tc=s.t==='Admin'?C.org:C.pri;
  h+='<div class="dc">'
    +'<div class="dnum" style="color:'+tc+'">'+id+'</div>'
    +'<div class="dtit">'+s.n+'</div>'
    +'<div style="margin-bottom:14px"><div class="dtag" style="background:'+tc+'10;color:'+tc+'">'+s.t+'</div>'
    +(s.mode==='admin'?' <div class="dtag" style="background:#F9731614;color:#F97316">Admin Only</div>':'')+'</div>';

  if(s.info){
    h+='<div class="dsec"><div class="dstit">Screen Details</div>';
    s.info.forEach(function(i){h+='<div class="dit"><div class="dbul" style="background:'+tc+'"></div>'+i+'</div>';});
    h+='</div>';
  }
  if(s.acts){
    h+='<div class="dsec"><div class="dstit">User Actions</div>';
    s.acts.forEach(function(a){h+='<div class="dit"><div class="dbul" style="background:'+C.grn+'"></div>'+a+'</div>';});
    h+='</div>';
  }
  if(s.leads){
    h+='<div class="dleads"><div class="dll">Leads to →</div><div class="dlv">'+s.leads+'</div></div>';
  }
  h+='</div>';
  pv.innerHTML=h;
}

function filterScreens(q){
  q=q.toLowerCase();
  var btns=document.querySelectorAll('.sbt');
  btns.forEach(function(b){
    b.style.display=(!q||b.textContent.toLowerCase().indexOf(q)>=0)?'flex':'none';
  });
}

/* Init */
buildSidebar();
</script>
